<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treino PRO</title>

<style>
body { font-family: Arial; background:#111; color:#fff; padding:10px; }
button { padding:8px; margin:4px; border:none; border-radius:8px; background:#c8f135; }
input { width:60px; margin:2px; }
.exercise { margin-bottom:20px; border-bottom:1px solid #333; padding-bottom:10px; }
.timer { position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
background:#000; padding:10px; border-radius:10px; display:none; text-align:center;}
</style>
</head>

<body>

<h2>Treino PRO</h2>

<!-- CRONÔMETRO -->
<div>
<span id="tempoTotal">00:00</span><br>
<button onclick="startTreino()">▶️</button>
<button onclick="pauseTreino()">⏸</button>
<button onclick="resetTreino()">⏹</button>
</div>

<!-- EXERCÍCIO -->
<div class="exercise" data-ex="supino" data-rest="60">
<h3>Supino</h3>

<input type="number" placeholder="Nº séries">
<button onclick="criarSeries(this)">Criar</button>

<div class="series-inputs"></div>
</div>

<button onclick="salvarTreino()">💾 Salvar</button>

<!-- TIMER -->
<div id="timerBox" class="timer">
<div id="timerCount">0</div>
<button onclick="pararTimer()">Parar</button>
</div>

<!-- GRÁFICO -->
<h3>📊 Evolução</h3>
<select id="seletorEx" onchange="atualizarGrafico()"></select>
<canvas id="grafico"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
// ===== CRONÔMETRO =====
let tempo = 0, rodando = false, intervalo;

function formatarTempo(seg){
let m = Math.floor(seg/60);
let s = seg%60;
return String(m).padStart(2,'0')+":"+String(s).padStart(2,'0');
}

function startTreino(){
if(rodando) return;
rodando = true;
intervalo = setInterval(()=>{
tempo++;
tempoTotal.innerText = formatarTempo(tempo);
},1000);
}

function pauseTreino(){ rodando=false; clearInterval(intervalo); }
function resetTreino(){ rodando=false; clearInterval(intervalo); tempo=0; tempoTotal.innerText="00:00"; }

// ===== SÉRIES =====
function criarSeries(btn){
const ex = btn.closest('.exercise');
const total = parseInt(ex.querySelector('input').value);
const box = ex.querySelector('.series-inputs');

if(!total || total < 1) return;

box.innerHTML = "";
localStorage.setItem("series_"+ex.dataset.ex, total);

for(let i=1;i<=total;i++){
let div=document.createElement('div');
div.innerHTML = `S${i} Kg <input type='number'> Reps <input type='number'>
<button onclick="finalizarSerie(this)">OK</button>`;
box.appendChild(div);
}
}

// ===== TIMER DESCANSO =====
let tInt;
function iniciarTimer(s){
let t=s;
timerBox.style.display="block";
timerCount.innerText=t;

clearInterval(tInt);
tInt=setInterval(()=>{
t--;
timerCount.innerText=t;
if(t<=0){
clearInterval(tInt);
timerCount.innerText="🔥";
}
},1000);
}

function finalizarSerie(btn){
let ex=btn.closest('.exercise');
iniciarTimer(parseInt(ex.dataset.rest) || 60);
}

function pararTimer(){
clearInterval(tInt);
timerBox.style.display="none";
}

// ===== SALVAR =====
function salvarTreino(){
let hist = JSON.parse(localStorage.getItem("hist"))||[];

document.querySelectorAll('.exercise').forEach(ex=>{
let series=[];
ex.querySelectorAll('.series-inputs div').forEach(r=>{
let i=r.querySelectorAll('input');
series.push({kg:+i[0].value,reps:+i[1].value});
});

hist.push({
ex:ex.dataset.ex,
data:new Date().toLocaleDateString(),
tempo:tempo,
series:series
});
});

localStorage.setItem("hist",JSON.stringify(hist));

alert("Treino salvo!");
carregarExercicios();
atualizarGrafico();
}

// ===== GRÁFICO =====
let chart;

function carregarExercicios() {
  const select = document.getElementById("seletorEx");
  select.innerHTML = "";

  document.querySelectorAll('.exercise').forEach(ex => {
    const id = ex.dataset.ex;

    const option = document.createElement("option");
    option.value = id;
    option.textContent = id.toUpperCase();

    select.appendChild(option);
  });
}

function atualizarGrafico() {
  const ex = document.getElementById("seletorEx").value;

  let hist = JSON.parse(localStorage.getItem("hist")) || [];
  let data = hist.filter(t => t.ex === ex);

  let labels = data.map(t => t.data);
  let cargas = data.map(t =>
    t.series.reduce((a, s) => a + s.kg, 0)
  );

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("grafico"), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: ex.toUpperCase(),
        data: cargas
      }]
    }
  });
}

// ===== AUTOLOAD =====
window.onload=()=>{
let hist = JSON.parse(localStorage.getItem("hist"))||[];

document.querySelectorAll('.exercise').forEach(ex=>{
let last = hist.filter(t=>t.ex===ex.dataset.ex).pop();
if(!last) return;

ex.querySelector('input').value = last.series.length;
criarSeries(ex.querySelector('button'));

let rows = ex.querySelectorAll('.series-inputs div');

rows.forEach((r,i)=>{
if(last.series[i]){
let inputs=r.querySelectorAll('input');
inputs[0].value=last.series[i].kg;
inputs[1].value=last.series[i].reps;
}
});
});

carregarExercicios();
atualizarGrafico();
};
</script>

</body>
</html>
